name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ultimatype-monorepo/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/sukushaing/ultimatype-api
  WEB_IMAGE: ghcr.io/sukushaing/ultimatype-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./ultimatype-monorepo
          file: ./ultimatype-monorepo/apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./ultimatype-monorepo
          file: ./ultimatype-monorepo/apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:latest
            ${{ env.WEB_IMAGE }}:${{ github.sha }}

      - name: Trigger Dokploy redeploy
        if: success()
        run: |
          echo "Triggering Dokploy webhook..."
          HTTP_STATUS=$(curl -s -o /dev/stderr -w "%{http_code}" \
            -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -k -L --max-time 30)
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::warning::Dokploy webhook returned HTTP $HTTP_STATUS"
          fi
